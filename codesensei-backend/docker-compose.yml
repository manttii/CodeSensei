version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: codesensei_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codesensei}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codesensei_secret}
      POSTGRES_DB: ${POSTGRES_DB:-codesensei_db}
    ports:
      - "5432:5432"
    volumes:
      - codesensei_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codesensei}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  codesensei_pgdata:
    driver: local
